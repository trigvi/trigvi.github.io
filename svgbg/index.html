    <script>

        var mode = '';
        var svgContentsLandscape = '';
        var svgContentsPortrait = '';

        function setMode(value) {

            // Set mode globally
            mode = value;

            // Set mode css classes (first remove any existing mode- class)
            var containers = document.querySelectorAll('.container');
            for (var idx=0; idx<containers.length; idx++) {
                var container = containers[idx];
                container.classList.remove('mode-dark');
                container.classList.remove('mode-light');
                container.classList.add(`mode-${value}`);
            }

            var menuButtons = document.querySelectorAll('.menu button');
            for (var idx=0; idx<menuButtons.length; idx++) {
                var menuButton = menuButtons[idx];
                menuButton.classList.remove('toggled');
                if (menuButton.id === 'menu-button-light' && mode === 'light') {
                    menuButton.classList.add('toggled');
                } else if (menuButton.id === 'menu-button-dark' && mode === 'dark') {
                    menuButton.classList.add('toggled');
                }
            }

            // Auto-generate new images
            generateImage('landscape');
            generateImage('portrait');

        }

        function generateImage(orientation='landscape') {

            // Generate new image
            var svg = document.createElementNS( 'http://www.w3.org/2000/svg', 'svg' );
            svg.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
            // svg.setAttribute('version', '1.1');

            var svgWidth = 7680;
            var svgHeight = 4320;
            if (orientation === 'portrait') {
                var svgWidth = 4320;
                var svgHeight = 7680;
            }
            svg.setAttribute('viewBox', '0 0 ' + svgWidth.toString() + ' ' + svgHeight.toString());
            svg.setAttribute('width', svgWidth);
            svg.setAttribute('height', svgHeight);
            var singleShapeMaxDimension = svgHeight;
            if (svgHeight > svgWidth) {
                singleShapeMaxDimension = svgWidth;
            }

            var backgroundRect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
            backgroundRect.setAttribute('width', svgWidth);
            backgroundRect.setAttribute('height', svgHeight);
            backgroundRect.setAttribute('style', 'fill: ' + generateRandomRgbColorString());
            svg.appendChild(backgroundRect);

            // var shape = 'circle';
            var shape;
            var randomShapeDecider = Math.random() * 100;
            if (randomShapeDecider < 50) {
                shape = 'circle';
            } else {
                shape = 'rect';
            }

            for (var idx=1; idx<=20; idx++) {

                var fillColor = '';
                var fillOpacity = 0;
                if (mode === 'dark') {
                    var fillColor = 'black';
                    var fillOpacity = 0.1 * Math.random();
                } else if (mode === 'light') {
                    var fillColor = 'black';
                    var fillOpacity = 0.05 * Math.random();
                }

                if (shape === 'rect') {
                    var rectWidth = Math.random() * (singleShapeMaxDimension/1.5);
                    var rectHeight = Math.random()* rectWidth;
                    var rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
                    rect.setAttribute('width', parseInt(rectWidth));
                    rect.setAttribute('height', parseInt(rectHeight));
                    rect.setAttribute('x', parseInt(svgWidth * Math.random()));
                    rect.setAttribute('y', parseInt(svgHeight * Math.random()));
                    rect.setAttribute('style', 'fill: ' + fillColor + '; opacity: ' + fillOpacity);
                    svg.appendChild(rect);

                } else if (shape === 'circle') {
                    var circleWidth = Math.random() * (singleShapeMaxDimension/1.5);
                    var circleRadius = circleWidth / 2;
                    var circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    circle.setAttribute('r', parseInt(circleRadius));
                    circle.setAttribute('cx', parseInt(svgWidth * Math.random()));
                    circle.setAttribute('cy', parseInt(svgHeight * Math.random()));
                    circle.setAttribute('style', 'fill: ' + fillColor + '; opacity: ' + fillOpacity);
                    svg.appendChild(circle);
                }
            }

            var svgContents = '';
            if (orientation === 'landscape') {
                svgContentsLandscape = svg.outerHTML;
                svgContents = svgContentsLandscape;
            } else if (orientation === 'portrait') {
                svgContentsPortrait = svg.outerHTML;
                svgContents = svgContentsPortrait;
            }

            var container = document.getElementById(`container-${orientation}`);
            var svgAsUrl = 'data:image/svg+xml;utf8,' + svgContents;
            container.style.background = "no-repeat black url('" + svgAsUrl + "')";
            container.style.backgroundSize = "cover";
        }

        function generateRandomString(length) {

            var result = '';
            var characters = '0123456789abcdefghijklmnopqrstuvwxyz';
            var charactersLength = characters.length;
            for (var idx=0; idx<length; idx++) {
                result += characters.charAt(Math.floor(Math.random() * charactersLength));
            }
            return result;

        }

        function downloadImageSvg(orientation='landscape') {

            var svgContents = '';
            if (orientation === 'landscape') {
                svgContents = svgContentsLandscape;
            } else if (orientation === 'portrait') {
                svgContents = svgContentsPortrait;
            }

            if (!svgContents) {
                return;
            }

            var filename = generateRandomString(10) + '.svg';
            var element = document.createElement('a');
            element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(svgContents));
            element.setAttribute('download', filename);
            element.style.display = 'none';
            document.body.appendChild(element);
            element.click();
            element.remove();

        }

        function generateRandomRgbColorString() {


            // Generate random HSL color
            // https://stackoverflow.com/a/43195379
            var h, s, l;
            if (mode === 'light') {
                h = 360 * Math.random();
                s = (20 + 70 * Math.random());
                l = (85 + 10 * Math.random());
            } else if (mode === 'dark') {
                h = 360 * Math.random();
                s = (25 + 20 * Math.random());
                l = 45;
            }
            // } else if (mode === 'dark') {
            //     h = 360 * Math.random();
            //     s = (10 + 20 * Math.random());
            //     l = 25;
            // }

            // Convert to RGB then stringify for CSS
            var rgb = HSLToRGB(h, s, l);
            return 'rgb(' + rgb[0] + ',' + rgb[1] + ',' + rgb[2] + ')';

        }

        function HSLToRGB(h, s, l) {

            // https://css-tricks.com/converting-color-spaces-in-javascript/
            s /= 100;
            l /= 100;

            var c = (1 - Math.abs(2 * l - 1)) * s;
            var x = c * (1 - Math.abs((h / 60) % 2 - 1));
            var m = l - c/2;
            var r = 0;
            var g = 0;
            var b = 0;

            if (0 <= h && h < 60) {
                r = c; g = x; b = 0;
            } else if (60 <= h && h < 120) {
                r = x; g = c; b = 0;
            } else if (120 <= h && h < 180) {
                r = 0; g = c; b = x;
            } else if (180 <= h && h < 240) {
                r = 0; g = x; b = c;
            } else if (240 <= h && h < 300) {
                r = x; g = 0; b = c;
            } else if (300 <= h && h < 360) {
                r = c; g = 0; b = x;
            }
            r = Math.round((r + m) * 255);
            g = Math.round((g + m) * 255);
            b = Math.round((b + m) * 255);

            return [r, g, b];

        }

        function RGBToHex(r, g, b) {

            // https://css-tricks.com/converting-color-spaces-in-javascript/
            var r = r.toString(16);
            var g = g.toString(16);
            var b = b.toString(16);

            if (r.length == 1) {
                r = '0' + r;
            }
            if (g.length == 1) {
                g = '0' + g;
            }
            if (b.length == 1) {
                b = '0' + b;
            }

            return '#' + r + g + b;

        }
